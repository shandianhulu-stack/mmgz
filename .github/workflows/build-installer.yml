name: build-installer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-installer:
    name: Windows Setup installer
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.11.1 openpyxl==3.1.5 et_xmlfile==2.0.0

      - name: Check source files
        shell: powershell
        run: |
          python -m py_compile server.py wage_core.py
          python -c "from wage_core import VERSION; print('MIMO WageScore version:', VERSION)"
          if (!(Test-Path "frontend/index.html")) { throw "frontend/index.html not found" }
          if (!(Test-Path "installer/MIMO_WageScore_Setup.iss")) { throw "installer/MIMO_WageScore_Setup.iss not found" }

      - name: Build Windows portable app folder
        shell: powershell
        run: |
          pyinstaller --clean --noconfirm --onedir --console `
            --name "MIMO_WageScore" `
            --paths vendor `
            --collect-all openpyxl `
            --collect-all et_xmlfile `
            --add-data "frontend;frontend" `
            server.py
          if (!(Test-Path "dist/MIMO_WageScore/MIMO_WageScore.exe")) { throw "PyInstaller output exe not found" }

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --yes --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "ISCC.exe not found after install" }

      - name: Build Windows installer Setup.exe
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force installer_output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\MIMO_WageScore_Setup.iss"
          if (!(Test-Path "installer_output/MIMO_WageScore_Setup_V1.4.0.exe")) { throw "Setup.exe not created" }

      - name: Upload Windows Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: MIMO-WageScore-Windows-Installer-Setup
          path: installer_output/MIMO_WageScore_Setup_V1.4.0.exe
          if-no-files-found: error

      - name: Upload Windows portable folder
        uses: actions/upload-artifact@v4
        with:
          name: MIMO-WageScore-Windows-Portable-Folder
          path: dist/MIMO_WageScore/
          if-no-files-found: error

  macos-portable:
    name: macOS portable
    runs-on: macos-14

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.11.1 openpyxl==3.1.5 et_xmlfile==2.0.0

      - name: Check source files
        run: |
          python -m py_compile server.py wage_core.py
          python -c "from wage_core import VERSION; print('MIMO WageScore version:', VERSION)"
          test -f frontend/index.html

      - name: Build macOS portable folder
        run: |
          pyinstaller --clean --noconfirm --onedir --console \
            --name "MIMO_WageScore_Mac" \
            --paths vendor \
            --collect-all openpyxl \
            --collect-all et_xmlfile \
            --add-data "frontend:frontend" \
            server.py
          mkdir -p release_mac
          cp -R "dist/MIMO_WageScore_Mac" "release_mac/MIMO_WageScore_Mac"
          cp "README_新电脑使用说明.txt" "release_mac/README_新电脑使用说明.txt" || true
          if [ -d "示例文件" ]; then cp -R "示例文件" "release_mac/示例文件"; fi
          zip -r "MIMO_WageScore_Mac_Portable_V1.4.0.zip" release_mac

      - name: Upload macOS portable
        uses: actions/upload-artifact@v4
        with:
          name: MIMO-WageScore-macOS-Portable
          path: MIMO_WageScore_Mac_Portable_V1.4.0.zip
          if-no-files-found: error
